name: CI - Tests must pass

on:

  pull_request:
    branches: 
      - main
    
  workflow_dispatch:

jobs:

  tests:

    name: Tests (Node ${{ matrix.node-version }})
    
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        node-version: [20,22,24]
    
    steps:
    
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

        
  
